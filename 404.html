<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Nicholus Mutugi</title>
<meta name="description" content="The page you're looking for doesn't exist.">
<meta name="robots" content="noindex">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="assets/css/styles.css">

<style>
  .error-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .error-content {
    text-align: center;
    max-width: 500px;
  }
  .error-code {
    font-family: var(--font-syne);
    font-size: clamp(6rem, 20vw, 12rem);
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    opacity: 0.3;
  }
  .error-title {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--white);
    margin: 1rem 0;
  }
  .error-message {
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--muted);
    margin-bottom: 2rem;
  }
  .error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .terminal-preview {
    margin-top: 3rem;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1.5rem;
    text-align: left;
    font-family: var(--font-mono);
    font-size: 0.75rem;
  }
  .terminal-preview .line {
    margin-bottom: 0.5rem;
  }
  .terminal-preview .prompt {
    color: var(--accent);
  }
  .terminal-preview .command {
    color: var(--text);
  }
  .terminal-preview .error {
    color: var(--accent2);
  }
  .terminal-preview .suggestion {
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="ring"></div>

<div class="error-container">
  <div class="error-content">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">
      The page you're looking for doesn't exist or has been moved.
      Let's get you back on track.
    </p>
    <div class="error-actions">
      <a href="index.html" class="btn-fill">Go Home →</a>
      <a href="contact.html" class="btn-line">Contact Me</a>
    </div>

    <div class="terminal-preview">
      <div class="line"><span class="prompt">$</span> <span class="command">find page.html</span></div>
      <div class="line"><span class="error">Error: File not found</span></div>
      <div class="line"><span class="prompt">$</span> <span class="suggestion"># Try going back to homepage</span></div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="config.js"></script>
<script src="assets/js/main.js"></script>
<script>
  // Simple cursor init for 404 page
  const cur = document.getElementById('cursor');
  const ring = document.getElementById('ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX;
    my = e.clientY;
    cur.style.transform = `translate(${mx - 5}px, ${my - 5}px)`;
  });

  (function loop() {
    rx += (mx - rx) * 0.1;
    ry += (my - ry) * 0.1;
    ring.style.transform = `translate(${rx - 17}px, ${ry - 17}px)`;
    requestAnimationFrame(loop);
  })();
</script>

</body>
</html>
